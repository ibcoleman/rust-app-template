name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer, clippy, rustfmt
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: rustup install 1.80
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F rust-app-template-frontend build
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: bazel test //... --test_output=errors
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: bazelbuild/setup-bazelisk@v3
      - run: rustup install 1.80
      - run: bazel test //tests:integration_db --test_tag_filters=manual --test_output=errors --cache_test_results=no
